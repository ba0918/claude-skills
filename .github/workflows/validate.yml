name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # チェックの正本は scripts/run_checks.sh。pre-push hook (githooks/pre-push)
      # も同じスクリプトを呼ぶため、ローカルと CI の検証内容は常に一致する。
      - name: Run all checks (shared with pre-push hook)
        run: sh scripts/run_checks.sh
